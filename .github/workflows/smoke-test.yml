name: Smoke Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  smoke-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install server dependencies
        run: npm install
        working-directory: server

      - name: Start server and run smoke tests
        env:
          JWT_SECRET: ci-test-secret-not-for-production
          DB_PATH: /tmp/ci-test.db
          NODE_ENV: test
          PORT: 3001
        run: |
          node index.js &
          SERVER_PID=$!

          # Wait up to 20 seconds for server to boot
          echo "Waiting for server to start..."
          for i in $(seq 1 20); do
            if curl -sf http://localhost:3001/api/health > /dev/null 2>&1; then
              echo "Server is up after ${i}s"
              break
            fi
            sleep 1
          done

          # Test 1: health endpoint returns ok
          echo ""
          echo "--- Test 1: /api/health ---"
          HEALTH=$(curl -sf http://localhost:3001/api/health)
          echo "$HEALTH"
          echo "$HEALTH" | grep -q '"status":"ok"' || { echo "FAIL: health check"; kill $SERVER_PID; exit 1; }
          echo "PASS"

          # Test 2: login with missing body returns 400, not 500
          echo ""
          echo "--- Test 2: /api/auth/login (bad request) ---"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST http://localhost:3001/api/auth/login \
            -H "Content-Type: application/json" -d '{}')
          echo "HTTP $STATUS"
          [ "$STATUS" = "400" ] || [ "$STATUS" = "401" ] || { echo "FAIL: expected 400/401, got $STATUS"; kill $SERVER_PID; exit 1; }
          echo "PASS"

          # Test 3: protected route without token returns 401
          echo ""
          echo "--- Test 3: /api/users/me (no token) ---"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3001/api/users/me)
          echo "HTTP $STATUS"
          [ "$STATUS" = "401" ] || { echo "FAIL: expected 401, got $STATUS"; kill $SERVER_PID; exit 1; }
          echo "PASS"

          kill $SERVER_PID
          echo ""
          echo "All smoke tests passed."
        working-directory: server
